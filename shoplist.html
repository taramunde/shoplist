<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --primary-light: #C8E6C9;
            --danger: #f44336;
            --danger-dark: #d32f2f;
            --gray: #757575;
            --light-gray: #f5f5f5;
            --white: #ffffff;
            --shadow: 0 2px 8px rgba(0,0,0,0.15);
            --radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1::before {
            content: '🛒';
            font-size: 32px;
        }

        .header p {
            color: var(--gray);
            font-size: 14px;
        }

        .shared-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius);
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .btn-share {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-share:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-copy {
            background: #2196F3;
            color: white;
            flex: 1;
        }

        .btn-copy:hover {
            background: #1976D2;
        }

        .btn-close {
            background: var(--gray);
            color: white;
            padding: 10px 20px;
        }

        .btn-close:hover {
            background: #616161;
        }

        .list-container {
            min-height: 100px;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--light-gray);
            border-radius: var(--radius);
            margin-bottom: 10px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .list-item:hover {
            background: #eeeeee;
        }

        .list-item.completed {
            opacity: 0.6;
        }

        .list-item.completed .item-text {
            text-decoration: line-through;
            color: var(--gray);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            margin-right: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .checkbox.checked {
            background: var(--primary);
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .item-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            word-break: break-word;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
            opacity: 0.7;
        }

        .delete-btn:hover {
            background: #ffebee;
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 16px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--light-gray);
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--gray);
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 22px;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--light-gray);
            border-radius: var(--radius);
        }

        .link-container {
            background: var(--light-gray);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 16px;
            word-break: break-all;
            font-size: 12px;
            color: var(--gray);
            max-height: 80px;
            overflow-y: auto;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            animation: toastIn 0.3s ease-out;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 14px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background: #ffebee;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 14px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--primary-light);
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .card {
                padding: 18px;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Shopping List</h1>
                <p>Add items and share with family & friends</p>
                <div id="sharedBadge" class="shared-badge" style="display: none;">
                    📥 Shared List
                </div>
            </div>

            <div id="viewMode">
                <div class="actions-bar">
                    <div class="stats">
                        <span id="totalCount">📝 0 items</span>
                        <span id="completedCount">✅ 0 done</span>
                    </div>
                    <button class="clear-btn" onclick="clearCompleted()">Clear Done</button>
                </div>

                <div class="input-group">
                    <input 
                        type="text" 
                        id="itemInput" 
                        placeholder="Add an item..." 
                        autocomplete="off"
                        onkeypress="handleKeyPress(event)"
                    >
                    <button class="btn btn-primary" onclick="addItem()">
                        Add
                    </button>
                </div>

                <div class="list-container" id="listContainer">
                    <div class="empty-state">
                        <div class="icon">🛍️</div>
                        <p>Your shopping list is empty.<br>Add some items to get started!</p>
                    </div>
                </div>

                <button class="btn btn-share" onclick="openShareModal()" id="shareBtn">
                    📤 Share List
                </button>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <h2>📤 Share Your List</h2>
            <div class="qr-container">
                <canvas id="qrCanvas"></canvas>
            </div>
            <div class="link-container" id="shareLink"></div>
            <div class="modal-actions">
                <button class="btn btn-copy" onclick="copyLink()">
                    📋 Copy Link
                </button>
                <button class="btn btn-close" onclick="closeShareModal()">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // Shopping List Application
        // Data is encoded in URL for sharing across devices

        let shoppingList = [];

        // Initialize the app
        function init() {
            // Check if there's shared data in URL
            const urlParams = new URLSearchParams(window.location.search);
            const sharedData = urlParams.get('list');
            
            if (sharedData) {
                try {
                    // Decode the shared list from URL
                    const decoded = atob(sharedData);
                    shoppingList = JSON.parse(decoded);
                    document.getElementById('sharedBadge').style.display = 'inline-flex';
                    
                    // Clean URL after loading shared list (optional - keeps URL clean)
                    // window.history.replaceState({}, document.title, window.location.pathname);
                } catch (e) {
                    console.error('Failed to parse shared list:', e);
                    shoppingList = loadFromStorage();
                }
            } else {
                // Load from localStorage if no shared data
                shoppingList = loadFromStorage();
            }

            renderList();
        }

        // Save to localStorage
        function saveToStorage() {
            localStorage.setItem('shoppingList', JSON.stringify(shoppingList));
        }

        // Load from localStorage
        function loadFromStorage() {
            const saved = localStorage.getItem('shoppingList');
            return saved ? JSON.parse(saved) : [];
        }

        // Add new item
        function addItem() {
            const input = document.getElementById('itemInput');
            const text = input.value.trim();
            
            if (text) {
                shoppingList.push({
                    id: Date.now(),
                    text: text,
                    completed: false
                });
                input.value = '';
                saveToStorage();
                renderList();
            }
            
            input.focus();
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addItem();
            }
        }

        // Toggle item completion
        function toggleItem(id) {
            const item = shoppingList.find(item => item.id === id);
            if (item) {
                item.completed = !item.completed;
                saveToStorage();
                renderList();
            }
        }

        // Delete item
        function deleteItem(id) {
            shoppingList = shoppingList.filter(item => item.id !== id);
            saveToStorage();
            renderList();
        }

        // Clear completed items
        function clearCompleted() {
            shoppingList = shoppingList.filter(item => !item.completed);
            saveToStorage();
            renderList();
        }

        // Render the list
        function renderList() {
            const container = document.getElementById('listContainer');
            const totalCount = document.getElementById('totalCount');
            const completedCount = document.getElementById('completedCount');
            const shareBtn = document.getElementById('shareBtn');
            
            // Update stats
            const total = shoppingList.length;
            const completed = shoppingList.filter(item => item.completed).length;
            totalCount.textContent = `📝 ${total} item${total !== 1 ? 's' : ''}`;
            completedCount.textContent = `✅ ${completed} done`;
            
            // Show/hide share button
            shareBtn.style.display = total > 0 ? 'flex' : 'none';
            
            if (total === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🛍️</div>
                        <p>Your shopping list is empty.<br>Add some items to get started!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = shoppingList.map(item => `
                <div class="list-item ${item.completed ? 'completed' : ''}">
                    <div class="checkbox ${item.completed ? 'checked' : ''}" onclick="toggleItem(${item.id})"></div>
                    <span class="item-text">${escapeHtml(item.text)}</span>
                    <button class="delete-btn" onclick="deleteItem(${item.id})" title="Delete">✕</button>
                </div>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Generate shareable link
        function generateShareLink() {
            const baseUrl = window.location.origin + window.location.pathname;
            const encodedData = btoa(JSON.stringify(shoppingList));
            return `${baseUrl}?list=${encodeURIComponent(encodedData)}`;
        }

        // Open share modal
        function openShareModal() {
            if (shoppingList.length === 0) {
                showToast('Add some items first!');
                return;
            }
            
            const shareLink = generateShareLink();
            document.getElementById('shareLink').textContent = shareLink;
            
            // Generate QR code
            const canvas = document.getElementById('qrCanvas');
            QRCode.toCanvas(canvas, shareLink, {
                width: 200,
                margin: 2,
                color: {
                    dark: '#333333',
                    light: '#ffffff'
                }
            }, function(error) {
                if (error) {
                    console.error('QR Code error:', error);
                }
            });
            
            document.getElementById('shareModal').classList.add('active');
        }

        // Close share modal
        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('active');
        }

        // Copy link to clipboard
        function copyLink() {
            const shareLink = generateShareLink();
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shareLink).then(() => {
                    showToast('Link copied to clipboard!');
                }).catch(() => {
                    fallbackCopy(shareLink);
                });
            } else {
                fallbackCopy(shareLink);
            }
        }

        // Fallback copy method
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast('Link copied to clipboard!');
            } catch (e) {
                showToast('Failed to copy. Please copy manually.');
            }
            
            document.body.removeChild(textarea);
        }

        // Show toast notification
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) {
                existing.remove();
            }
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Close modal when clicking outside
        document.getElementById('shareModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeShareModal();
            }
        });

        // Initialize on page load
        init();
    </script>
</body>
</html>

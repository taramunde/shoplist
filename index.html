<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">
<link rel="apple-touch-icon" href="icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Go2Market Web</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="row" style="justify-content:space-between">
    <h1>🛒 <span id="appTitle">Go2Market</span></h1>
    <select id="listaSelector" onchange="cambiarLista()"></select>
  </div>
  <div class="row" style="margin-top:8px; gap:6px">
    <input id="establecimiento" type="text" placeholder="Supermercado">
    <input id="colorPicker" type="color" value="#22c55e" title="Color lista" style="width:44px; height:40px; padding:0; border:none; background:none">
    <div class="total" id="total">0,00 €</div>
  </div>
  <div class="row" style="margin-top:8px; justify-content:space-between">
    <span class="small">Modo: <strong id="modoLabel">Edición</strong></span>
    <div class="flex">
      <button class="ghost" onclick="toggleModo()" id="toggleModo">Compra</button>
      <button class="ghost" onclick="nuevaLista()">+ Lista</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <strong>Productos por tipo</strong>
      <div class="flex">
        <button class="ghost" onclick="startVoice()" title="Añadir por voz">🎙️</button>
        <button class="ghost" onclick="addCategory()">+ Tipo</button>
      </div>
    </div>
    <div id="categorias" style="margin-top:10px"></div>
    <div id="voiceStatus" class="small" style="margin-top:6px; display:none"></div>
  </div>

  <div class="card">
    <strong>📍 Ubicación</strong>
    <div class="row" style="margin-top:8px">
      <button onclick="getLocation()">Obtener</button>
      <span class="small" id="coords">Sin coordenadas</span>
    </div>
    <input id="direccion" type="text" placeholder="Calle, número" style="margin-top:8px">
  </div>

  <div class="card">
    <strong>🅿️ Foto parking</strong>
    <input type="file" accept="image/*" capture="environment" id="fotoInput" style="display:none">
    <div class="photo-box" onclick="document.getElementById('fotoInput').click()">
      <span id="fotoPlaceholder">Toca para foto</span>
      <img id="fotoPreview" style="display:none">
    </div>
  </div>

  <div class="card">
    <strong>🔗 Compartir</strong>
    <div class="small">Tiempo real vía enlace. Quien abre entra en modo Compra.</div>
    <div class="share-grid" style="margin-top:10px">
      <button onclick="shareWhatsApp()">WhatsApp</button>
      <button onclick="shareTelegram()">Telegram</button>
      <button class="ghost" onclick="copyLink()">Copiar</button>
      <button class="ghost" onclick="generarEnlace()">Actualizar</button>
    </div>
    <input id="shareUrl" type="text" readonly style="margin-top:8px; font-size:12px">
  </div>
</div>

<script src="app.js"></script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script>
</body>
</html>

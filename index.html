<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Shopping List</h1>
                <p>Add items and share with family & friends</p>
                <div id="sharedBadge" class="shared-badge" style="display: none;">
                    📥 Shared List
                </div>
            </div>

            <div id="viewMode">
                <div class="actions-bar">
                    <div class="stats">
                        <span id="totalCount">📝 0 items</span>
                        <span id="completedCount">✅ 0 done</span>
                    </div>
                    <button class="clear-btn" onclick="clearCompleted()">Clear Done</button>
                </div>

                <div class="input-group">
                    <input 
                        type="text" 
                        id="itemInput" 
                        placeholder="Add an item..." 
                        autocomplete="off"
                        onkeypress="handleKeyPress(event)"
                    >
                    <button class="btn btn-primary" onclick="addItem()">
                        Add
                    </button>
                </div>

                <div class="list-container" id="listContainer">
                    <div class="empty-state">
                        <div class="icon">🛍️</div>
                        <p>Your shopping list is empty.<br>Add some items to get started!</p>
                    </div>
                </div>

                <button class="btn btn-share" onclick="openShareModal()" id="shareBtn">
                    📤 Share List
                </button>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <h2>📤 Share Your List</h2>
            <div class="qr-container">
                <canvas id="qrCanvas"></canvas>
            </div>
            <div class="link-container" id="shareLink"></div>
            <div class="modal-actions">
                <button class="btn btn-copy" onclick="copyLink()">
                    📋 Copy Link
                </button>
                <button class="btn btn-close" onclick="closeShareModal()">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <!-- Main App Script -->
    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shoplist • minimalist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="login-screen">
        <div class="login-inner">
            <div class="app-icon">🛍️</div>
            <h1 class="app-title">shoplist</h1>
            <p class="app-subtitle">Tus listas, sin complicaciones.</p>
            <div class="login-card">
                <button onclick="createNewList()" class="btn-primary btn-xl">Crear Nueva Lista</button>
                <p class="hint">Crea tu lista y usa Compartir para enviarla por QR o enlace.</p>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">

        <div class="topbar">
            <span class="topbar-label">Total pendiente:</span>
            <span id="grand-total" class="topbar-total">$0.00</span>
        </div>

        <div class="header">
            <h2 class="list-title">Mi Lista</h2>
            <div class="header-actions">
                <button onclick="showShare()" class="btn-primary btn-sm">Compartir</button>
                <button onclick="logout()" class="btn-close">×</button>
            </div>
        </div>

        <div id="categories-list"></div>

        <div class="bottom-bar">
            <button onclick="addCategory()" class="btn-secondary">+ Categoría</button>
            <button onclick="addItemGlobal()" class="btn-primary btn-lg">+ Añadir Producto</button>
        </div>
    </div>
</div>

<!-- ITEM MODAL -->
<div id="item-modal" class="modal-backdrop hidden" onclick="backdropClose(event,'item-modal')">
    <div class="modal">
        <h2 class="modal-title">Nuevo Producto</h2>
        <div class="form-group">
            <label>Categoría</label>
            <select id="modal-category"></select>
        </div>
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="modal-name" placeholder="ej. Leche entera">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Precio ($)</label>
                <input type="number" id="modal-price" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Cantidad</label>
                <input type="number" id="modal-qty" value="1" min="1">
            </div>
        </div>
        <div class="modal-actions">
            <button onclick="hideItemModal()" class="btn-secondary">Cancelar</button>
            <button onclick="saveModalItem()" class="btn-primary">Guardar</button>
        </div>
    </div>
</div>

<!-- SHARE MODAL -->
<div id="share-modal" class="modal-backdrop hidden" onclick="backdropClose(event,'share-modal')">
    <div class="modal modal-center">
        <div class="share-icon">📱</div>
        <h2 class="modal-title">Compartir Lista</h2>
        <p class="share-hint">Escanea este código con otro móvil</p>
        <div class="qr-wrapper">
            <img id="qr-code-img" src="" alt="QR Code">
        </div>
        <div class="modal-actions">
            <button onclick="copyShareableLink()" class="btn-primary">Copiar Enlace</button>
            <button onclick="hideShareModal()" class="btn-secondary">Cerrar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

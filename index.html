<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping List</title>
    <link rel="stylesheet" href="css/style.css?nocache=20251231v2">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Shopping List</h1>
            <p class="subtitle">Create, Share, and Shop.</p>
        </header>

        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Add an item (e.g., Milk)" autocomplete="off">
            <button id="addBtn">Add</button>
        </div>

        <div class="list-container">
            <ul id="shoppingList"></ul>
            <p id="emptyMsg">Your list is empty. Add items above.</p>
        </div>

        <div class="actions">
            <button id="scanBtn" class="btn-secondary">Scan QR</button>
            <button id="shareBtn" class="btn-primary">Share List</button>
            <button id="clearBtn" class="btn-danger">Clear List</button>
        </div>

        <div id="shareModal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Share Your List</h2>
                <p>Scan the QR code or copy the link:</p>
                
                <div id="qrcodeContainer"></div>
                
                <div class="link-group">
                    <input type="text" id="shareLink" readonly>
                    <button id="copyBtn">Copy</button>
                </div>
            </div>
        </div>

        <div id="scanModal" class="modal">
            <div class="modal-content">
                <span class="close-scan-btn close-btn">&times;</span>
                <h2>Scan a List</h2>
                <p>Point your camera at the QR code.</p>
                <div id="reader" style="width: 100%; margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js?nocache=20251231v2"></script>
</body>
</html>
